# Publishes DoDocs' own manual (the `docs/` folder of this repo), built by DoDocs itself.
# It has nothing to do with the docs of any project that *uses* DoDocs -- those are built by the
# consuming repository's own workflow, when that repository is pushed to.
name: DoDocs docs site
on:
  push:
    branches: ['main']
  workflow_dispatch:

# Cancel previous run (see: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#concurrency)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
      pages: write
      id-token: write
    # Our own reusable workflow, in this repo -- so DoDocs builds its docs with DoDocs.
    uses: ./.github/workflows/build.yml
    with:
      mdx: 'docs'
      libname: 'DoDocs'
      libname_short: 'do'
      libname_dotsuffix_label: 'docs'
      libname_dotsuffix_href: 'https://github.com/thiagocajadev/do-docs'
      home_redirect: '/getting-started/introduction'
      # The manual itself is written in English, so the chrome matches it.
      locale: 'en'
      icon: '🖨️'
      logo: 'gutenberg.jpg'
      github: 'https://github.com/thiagocajadev/do-docs'
      theme_primary: '#323e48'
      theme_scheme: 'tonalSpot'
      theme_contrast: '0'
      theme_note: '#1f6feb'
      theme_tip: '#238636'
      theme_important: '#8957e5'
      theme_warning: '#d29922'
      theme_caution: '#da3633'

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
