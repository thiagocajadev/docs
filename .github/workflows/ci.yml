name: CI
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  main-job:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    steps:
      #
      # ███████ ███████ ████████ ██    ██ ██████
      # ██      ██         ██    ██    ██ ██   ██
      # ███████ █████      ██    ██    ██ ██████
      #      ██ ██         ██    ██    ██ ██
      # ███████ ███████    ██     ██████  ██
      #

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      #
      # ████████ ███████ ███████ ████████
      #    ██    ██      ██         ██
      #    ██    █████   ███████    ██
      #    ██    ██           ██    ██
      #    ██    ███████ ███████    ██
      #

      - run: pnpm test

      #
      # ██    ██ ███████ ██████  ███████ ██  ██████  ███    ██
      # ██    ██ ██      ██   ██ ██      ██ ██    ██ ████   ██
      # ██    ██ █████   ██████  ███████ ██ ██    ██ ██ ██  ██
      #  ██  ██  ██      ██   ██      ██ ██ ██    ██ ██  ██ ██
      #   ████   ███████ ██   ██ ███████ ██  ██████  ██   ████
      #
      # Releases are cut by bumping `version` in package.json. A version is unreleased while no
      # `v<version>` tag points at it, which is what the check below asks.
      #
      # It reads the repo, not the event payload, so it behaves the same on a push and on a manual
      # run, and re-running a job never republishes. (The previous EndBug/version-check walked
      # `payload.commits`, which does not exist on workflow_dispatch, and crashed there.)
      #

      - name: Check whether this version is released
        id: check
        run: |
          set -e

          VERSION=$(node -p "require('./package.json').version")
          MAJOR_VERSION=${VERSION%%.*}

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_version=$MAJOR_VERSION" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is already tagged: nothing to publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION has no tag yet: publishing image and tags."
          fi

      #
      # ██████   ██████   ██████ ██   ██ ███████ ██████
      # ██   ██ ██    ██ ██      ██  ██  ██      ██   ██
      # ██   ██ ██    ██ ██      █████   █████   ██████
      # ██   ██ ██    ██ ██      ██  ██  ██      ██   ██
      # ██████   ██████   ██████ ██   ██ ███████ ██   ██
      #
      # The image IS the product: the reusable build.yml runs it to render anyone's docs.
      #

      - uses: docker/login-action@v3
        if: steps.check.outputs.changed == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        if: steps.check.outputs.changed == 'true'
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.check.outputs.major_version }}
            type=raw,value=${{ steps.check.outputs.version }}

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          # Always build, so a broken Dockerfile fails the PR. Only push on a version bump.
          push: ${{ steps.check.outputs.changed == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - uses: actions/attest-build-provenance@v3
        if: steps.check.outputs.changed == 'true'
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: git tag
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"

          VERSION=${{ steps.check.outputs.version }}

          # The tag exists to answer one question: is this version released? Only the newest one can
          # ever answer it, so the older tags are dropped. Consumers pin the Docker image tag, not
          # this repository, and the reusable workflow is referenced at `@main`.
          git tag -fa v$VERSION -m "Update version tag to v$VERSION"
          git push origin v$VERSION --force

          for OLD_TAG in $(git tag -l 'v*' | grep -vx "v$VERSION"); do
            git push origin --delete "$OLD_TAG"
          done
